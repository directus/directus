# FAPI 2.0 blackbox test fixture
# Spins up Keycloak 26 with a pre-configured FAPI 2.0 realm.
# Enforces PAR + PKCE S256 + DPoP + private_key_jwt via per-client attributes
# (NOT the built-in fapi-2-dpop-security-profile policy, which rejects http:// redirect URIs).
#
# Usage:
#   docker compose up -d
#   # set AUTH_FAPI2_TEST_ISSUER_URL=http://localhost:9090/realms/fapi2 in .env.test
#   pnpm --filter @directus/api test src/auth/drivers/fapi.test.ts
#
# Test credentials
#   Client ID:   directus-fapi2-client
#   Test user:   testuser / Test@password1

services:
  keycloak-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_FEATURES: dpop
    ports:
      - '9090:8080'
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/fapi2-realm.json:ro
    depends_on:
      - keycloak-postgres
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'exec 3<>/dev/tcp/localhost/9000 && echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection:
          close\r\n\r\n" >&3 && cat <&3 | grep -q "UP"',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  keycloak-db:
