post:
  summary: Import Items
  description: Import multiple records from a JSON or CSV file into a collection.
  operationId: import
  parameters:
    - description: Collection identifier
      in: path
      name: collection
      required: true
      schema:
        type: string
    - description: >-
        When true, the upload is received and the import is processed asynchronously in the background. The endpoint
        responds with 202 Accepted once the upload has been received.
      in: query
      name: background
      required: false
      schema:
        type: boolean
  requestBody:
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
  responses:
    '200':
      description: Successful request (synchronous import completed)
    '202':
      description: Upload accepted, import is running in the background (returned when `background=true`)
    '413':
      description: The uploaded file exceeds `IMPORT_MAX_FILE_SIZE`
  tags:
    - Utilities
