post:
  summary: Import Multiple Collections
  description: >-
    Import flat data for multiple related collections in a single request. Relations are resolved from the schema so
    collections are imported in dependency order and primary keys are remapped.
  operationId: importBatch
  parameters:
    - description: >-
        `add` inserts new items and remaps conflicting primary keys, `merge` upserts items. Defaults to `add`.
      in: query
      name: mode
      required: false
      schema:
        type: string
        enum:
          - add
          - merge
    - description: When true, no data is persisted; the computed id mappings are still returned.
      in: query
      name: dry_run
      required: false
      schema:
        type: boolean
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            required:
              - collection
              - items
            properties:
              collection:
                type: string
              items:
                type: array
                items:
                  type: object
        example:
          - collection: authors
            items:
              - id: '123'
                name: Lorem Ipsum
          - collection: articles
            items:
              - id: '123'
                title: Hello World
                author: '123'
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  applied:
                    type: boolean
                    description: Whether the changes were committed. `false` for a dry run.
                  mode:
                    type: string
                    enum:
                      - add
                      - merge
                  collections:
                    type: object
                    description: Per-collection summary of the changes made.
                    additionalProperties:
                      type: object
                      properties:
                        existing:
                          type: array
                          description: Primary keys of pre-existing records that were matched and updated.
                          items:
                            type: string
                        new:
                          type: array
                          description: Primary keys of newly created records.
                          items:
                            type: string
                        mapped:
                          type: object
                          description: Provided primary key -> new primary key, for records whose key was remapped.
  tags:
    - Utilities
