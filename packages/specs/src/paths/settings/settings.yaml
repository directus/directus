get:
  summary: Retrieve Settings
  description: List the settings.
  operationId: getSettings
  # Only Fields applies: the controller calls SettingsService#readSingleton(), which forces
  # limit to 1 (pagination params are moot) and never invokes MetaService (meta is moot too).
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/Fields'
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../../openapi.yaml#/components/schemas/Settings'
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '404':
      $ref: '../../openapi.yaml#/components/responses/NotFoundError'
  tags:
    - Settings

patch:
  summary: Update Settings
  description: Update the settings
  operationId: updateSetting
  requestBody:
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../../openapi.yaml#/components/schemas/Settings'
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '404':
      $ref: '../../openapi.yaml#/components/responses/NotFoundError'
  tags:
    - Settings
