get:
  summary: System Info
  description: Perform a system status check and return the options.
  operationId: serverInfo
  security:
    - {}
    - Auth: []
    - KeyAuth: []
    - CookieAuth: []
  responses:
    '200':
      content:
        application/json:
          # TODO(directus/directus#27765): data.* has three tiers of conditionally-present
          # fields (public/authenticated/admin) and several boolean-or-object union fields
          # (e.g. rateLimit, websocket) - see ServerService.serverInfo(). This placeholder
          # schema needs a real shape once that's modeled.
          schema:
            properties:
              data:
                type: object
            type: object
      description: Successful request
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '404':
      $ref: '../../openapi.yaml#/components/responses/NotFoundError'
  tags:
    - Server
