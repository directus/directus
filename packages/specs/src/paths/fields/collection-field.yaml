get:
  summary: Retrieve a Field
  description: Retrieves the details of a single field in a given collection.
  operationId: getCollectionField
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../../openapi.yaml#/components/schemas/Fields'
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '404':
      $ref: '../../openapi.yaml#/components/responses/NotFoundError'
  tags:
    - Fields

patch:
  summary: Update a Field
  description: Update an existing field.
  operationId: updateField
  requestBody:
    content:
      application/json:
        schema:
          $ref: '../../openapi.yaml#/components/schemas/Fields'
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../../openapi.yaml#/components/schemas/Fields'
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '404':
      $ref: '../../openapi.yaml#/components/responses/NotFoundError'
  tags:
    - Fields

delete:
  summary: Delete a Field
  description: Delete an existing field.
  operationId: deleteField
  responses:
    '200':
      description: Successful request
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '404':
      $ref: '../../openapi.yaml#/components/responses/NotFoundError'
  tags:
    - Fields

parameters:
  - name: collection
    in: path
    description: Unique identifier of the collection the item resides in.
    schema:
      type: string
    required: true
  - name: id
    in: path
    description: Unique identifier of the field.
    schema:
      type: string
    required: true
