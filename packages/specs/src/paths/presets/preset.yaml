get:
  tags:
    - Presets
  operationId: getPreset
  summary: Retrieve a Preset
  description: Retrieve a single preset by unique identifier.
  security:
    - Auth: []
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/Fields'
    - $ref: '../../openapi.yaml#/components/parameters/Meta'
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../../openapi.yaml#/components/schemas/Presets'
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'

patch:
  tags:
    - Presets
  operationId: updatePreset
  summary: Update a Preset
  description: Update an existing preset.
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/Fields'
    - $ref: '../../openapi.yaml#/components/parameters/Meta'
  requestBody:
    content:
      application/json:
        schema:
          $ref: '../../openapi.yaml#/components/schemas/Presets'
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../../openapi.yaml#/components/schemas/Presets'
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'

delete:
  tags:
    - Presets
  operationId: deletePreset
  summary: Delete a Preset
  description: Delete an existing preset.
  security:
    - Auth: []
  responses:
    '200':
      description: Successful request
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
parameters:
  - $ref: '../../openapi.yaml#/components/parameters/Id'
