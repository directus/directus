post:
  security: []
  summary: Logout
  description: >
    Log out the current user by invalidating their refresh token or session. The token is read from the request body, a
    httpOnly cookie, or the session cookie depending on the mode used at login.
  tags:
    - Authentication
  operationId: logout
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            refresh_token:
              type: string
              example: eyJ0eXAiOiJKV...
              description:
                The refresh token to invalidate. Required in `json` mode; omit for `cookie` or `session` mode.
            mode:
              type: string
              enum: [json, cookie, session]
              default: cookie
              description: |
                Controls how the refresh token is read.
                `json` reads the refresh token from the request body.
                `cookie` reads the refresh token from a httpOnly cookie.
                `session` reads the session ID from the session cookie.
  responses:
    '200':
      description: Successful request
