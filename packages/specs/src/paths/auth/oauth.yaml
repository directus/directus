get:
  security: []
  tags:
    - Authentication
  operationId: listAuthProviders
  summary: List Auth Providers
  description: List all configured auth providers.
  parameters:
    - name: sessionOnly
      in: query
      required: false
      description: Only return providers that support session-based authentication.
      schema:
        type: boolean
  responses:
    '200':
      description: Successful request
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Unique key of the provider.
                    driver:
                      type: string
                      description: Driver type (local, oauth2, openid, ldap, saml).
                    icon:
                      type: string
                      nullable: true
                      description: Icon shown in the app login screen.
                    label:
                      type: string
                      nullable: true
                      description: Display label shown in the app login screen.
              disableDefault:
                type: boolean
                description: Whether the default local login form is hidden.
