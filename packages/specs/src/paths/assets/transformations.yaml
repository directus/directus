delete:
  summary: Clear Asset Transformations
  description: Purges cached asset transformations (e.g. thumbnails, resizes etc) from storage.
  operationId: clear-asset-transformations
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
          properties:
            files:
              type: array
              items:
                type: string
                format: uuid
              description:
                UUIDs of specific files to purge transformations for. If omitted, all transformations are purged.
  responses:
    '204':
      description: Successful request
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '403':
      description: Forbidden - admin access required
  tags:
    - Assets
