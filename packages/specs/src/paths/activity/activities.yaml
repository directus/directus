  summary: List Activity Actions
  description: Returns a list of activity actions.
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/Fields'
    - $ref: '../../openapi.yaml#/components/parameters/Filter'
    - $ref: '../../openapi.yaml#/components/parameters/Search'
    - $ref: '../../openapi.yaml#/components/parameters/Sort'
    - $ref: '../../openapi.yaml#/components/parameters/Limit'
    - $ref: '../../openapi.yaml#/components/parameters/Offset'
    - $ref: '../../openapi.yaml#/components/parameters/Page'
    - $ref: '../../openapi.yaml#/components/parameters/Aggregate'
    - $ref: '../../openapi.yaml#/components/parameters/GroupBy'
    - $ref: '../../openapi.yaml#/components/parameters/Deep'
    - $ref: '../../openapi.yaml#/components/parameters/Alias'
    - $ref: '../../openapi.yaml#/components/parameters/Export'
    - $ref: '../../openapi.yaml#/components/parameters/Backlink'
    - $ref: '../../openapi.yaml#/components/parameters/Meta'
  responses:
