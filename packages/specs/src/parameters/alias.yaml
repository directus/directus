description: >
  Rename fields on the fly, so you can request the same field multiple times using different relational paths, filters,
  or aggregations. The alias value must reference a same-collection field or a field function; it cannot contain a
  period. URL form: `?alias[user_id]=id`.
in: query
name: alias
required: false
content:
  application/json:
    schema:
      type: object
    examples:
      none:
        summary: No aliasing (default)
      singleRename:
        summary: Rename a field
        value: { 'user_id': 'id' }
      functionAlias:
        summary: Alias a field function
        value: { 'release_year': 'year(date_created)' }
      multipleRenames:
        summary: Multiple renames in one request
        value: { 'user_id': 'id', 'user_status': 'status' }
