type: object
# Runtime: Flow type (subset of the response) and FlowRaw type (input)
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/flows.ts#L5
# DB schema: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/database/migrations/20220429A-add-flows.ts
# TriggerType enum: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/flows.ts#L1
properties:
  id:
    description: Unique identifier for the flow.
    type: string
    format: uuid
    example: 2f24211d-d928-469a-aea3-3c8f53d4e426
  name:
    description: The name of the flow.
    type: string
    example: Update Articles Flow
    nullable: true
  icon:
    description: Icon displayed in the Data Studio for the flow.
    type: string
    example: bolt
    nullable: true
  color:
    description: Color of the icon displayed in the Data Studio for the flow.
    type: string
    example: '#112233'
    nullable: true
  description:
    description: Short description of the flow displayed in the Data Studio.
    type: string
    example: This flow is used to update articles periodically.
    nullable: true
  status:
    description: Current status of the flow.
    type: string
    example: active
    default: active
    enum: [active, inactive]
  trigger:
    description: Type of trigger for the flow.
    type: string
    example: manual
    enum: [event, manual, operation, schedule, webhook, null]
    nullable: true
  options:
    description: Options of the selected trigger for the flow.
    type: object
  accountability:
    description:
      The permission used during the flow. One of `all`, `activity`, or null (uses the triggering user's permissions).
    type: string
    example: all
    enum: [activity, all, null]
    nullable: true
  date_created:
    description: When the flow was created.
    type: string
    example: '2022-05-11T13:14:52Z'
    format: date-time
    nullable: true
  user_created:
    description: User that created the flow.
    example: 63716273-0f29-4648-8a2a-2af2948f6f78
    oneOf:
      - type: string
        format: uuid
      - $ref: '../openapi.yaml#/components/schemas/Users'
  operation:
    description: The operation connected to the trigger in the flow.
    oneOf:
      - type: string
        format: uuid
      - $ref: '../openapi.yaml#/components/schemas/Operations'
    nullable: true
  operations:
    description: Operations that belong to this flow (o2m relation via `directus_operations.flow`).
    type: array
    items:
      oneOf:
        - type: string
          format: uuid
        - $ref: '../openapi.yaml#/components/schemas/Operations'
