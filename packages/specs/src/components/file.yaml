type: object
properties:
  id:
    description: Unique identifier for the file.
    example: 8cbb43fe-4cdf-4991-8352-c461779cec02
    type: string
    format: uuid
  storage:
    description:
      Where the file is stored. Either `local` for the local filesystem or the name of the storage adapter (for example
      `s3`).
    example: local
    type: string
  filename_disk:
    description: Name of the file on disk. By default, Directus uses a random hash for the filename.
    example: a88c3b72-ac58-5436-a4ec-b2858531333a.jpg
    type: string
  filename_download:
    description: How you want to the file to be named when it's being downloaded.
    example: avatar.jpg
    type: string
  title:
    description: Title for the file. Is extracted from the filename on upload, but can be edited by the user.
    example: User Avatar
    type: string
    nullable: true
  type:
    description: MIME type of the file.
    example: image/jpeg
    type: string
    nullable: true
  folder:
    description: Virtual folder where this file resides in.
    example: null
    oneOf:
      - type: string
      - $ref: '../openapi.yaml#/components/schemas/Folders'
    nullable: true
  created_on:
    description: When the file was created.
    example: '2019-12-03T00:10:15+00:00'
    type: string
    format: date-time
  uploaded_by:
    description: User who uploaded the file.
    example: 63716273-0f29-4648-8a2a-2af2948f6f78
    oneOf:
      - type: string
      - $ref: '../openapi.yaml#/components/schemas/Users'
    nullable: true
  uploaded_on:
    description: When the file was last uploaded/replaced.
    example: '2019-12-03T00:10:15+00:00'
    type: string
    format: date-time
    nullable: true
  modified_by:
    description: User who last modified the file.
    example: 63716273-0f29-4648-8a2a-2af2948f6f78
    type: string
    format: uuid
    nullable: true
  modified_on:
    description: When the file was last modified.
    example: '2019-12-03T00:10:15+00:00'
    type: string
    format: date-time
  charset:
    description: Character set of the file.
    example: binary
    type: string
    nullable: true
  filesize:
    description: Size of the file in bytes.
    example: 137862
    type: integer
  width:
    description: Width of the file in pixels. Only applies to images.
    example: 800
    type: integer
    nullable: true
  height:
    description: Height of the file in pixels. Only applies to images.
    example: 838
    type: integer
    nullable: true
  duration:
    description: Duration of the file in seconds. Only applies to audio and video.
    example: 0
    type: integer
    nullable: true
  embed:
    description: Where the file was embedded from.
    example: null
    type: string
    nullable: true
  description:
    description: Description for the file.
    type: string
    nullable: true
  location:
    description: Where the file was created. Is automatically populated based on Exif data for images.
    type: string
    nullable: true
  tags:
    description:
      Tags for the file as a comma-separated string. Is automatically populated based on Exif data for images.
    example: 'nature,people,architecture'
    type: string
    nullable: true
  metadata:
    description: IPTC, Exif, and ICC metadata extracted from file
    type: object
    nullable: true
  focal_point_x:
    description: Horizontal focal point of the image, in pixels from the left edge. Used for image cropping.
    example: null
    type: integer
    nullable: true
  focal_point_y:
    description: Vertical focal point of the image, in pixels from the top edge. Used for image cropping.
    example: null
    type: integer
    nullable: true
  tus_id:
    description: TUS (resumable upload) identifier. Populated by the TUS upload flow when TUS is enabled.
    example: null
    type: string
    nullable: true
  tus_data:
    description: TUS (resumable upload) metadata. Populated by the TUS upload flow when TUS is enabled.
    example: null
    type: object
    nullable: true
