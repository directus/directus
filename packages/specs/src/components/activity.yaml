type: object
# Runtime: Activity type
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/activity.ts
# DB schema: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/database/seeds/10-activity.yaml
# `revisions` relation added in: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/database/migrations/20230823A-add-content-versioning.ts
properties:
  id:
    description: Unique identifier for the object.
    example: 2
    type: integer
  action:
    description: Action that was performed.
    example: update
    type: string
    enum:
      - comment
      - create
      - delete
      - install
      - login
      - logout
      - revert
      - run
      - update
      - upload
      - version_save
  user:
    description: The user who performed this action.
    oneOf:
      - type: string
        format: uuid
      - $ref: '../openapi.yaml#/components/schemas/Users'
    nullable: true
  timestamp:
    description: When the action happened.
    example: '2019-12-05T22:52:09Z'
    type: string
    format: date-time
  ip:
    description: The IP address of the user at the time the action took place.
    example: 127.0.0.1
    type: string
    nullable: true
  user_agent:
    description: User agent string of the browser the user used when the action took place.
    example:
      Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_1) AppleWebKit/537.36 (KHTML,like Gecko) Chrome/78.0.3904.108
      Safari/537.36
    type: string
    nullable: true
  origin:
    description: Origin of the request when the action took place.
    example: https://directus.com
    type: string
    nullable: true
  collection:
    description: Collection identifier in which the item resides.
    oneOf:
      - type: string
      - $ref: '../openapi.yaml#/components/schemas/Collections'
  item:
    description:
      Unique identifier for the item the action applied to. This is always a string, even for integer primary keys.
    example: '328'
    type: string
  revisions:
    description: Revisions associated with this activity record.
    type: array
    items:
      oneOf:
        - type: integer
        - $ref: '../openapi.yaml#/components/schemas/Revisions'
