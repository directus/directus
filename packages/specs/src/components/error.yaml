type: object
# Wire shape: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/middleware/error-handler.ts#L72-L79
required:
  - message
  - extensions
properties:
  message:
    description: Human-readable error message.
    type: string
  extensions:
    description:
      Error metadata. Always includes `code`; may include per-error context like `collection`, `field`, `value`.
    type: object
    required:
      - code
    properties:
      code:
        description: Machine-readable error code from `ErrorCode` enum.
        type: string
    additionalProperties: true
