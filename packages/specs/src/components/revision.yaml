type: object
# Runtime: Revision type (no exported type; shape follows directus_revisions)
# Seed schema: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/database/seeds/11-revisions.yaml
# `version` column added in: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/database/migrations/20230823A-add-content-versioning.ts#L35
properties:
  id:
    description: Unique identifier for the revision.
    example: 1
    type: integer
  activity:
    description: Unique identifier for the activity record.
    example: 2
    oneOf:
      - type: integer
      - $ref: '../openapi.yaml#/components/schemas/Activity'
  collection:
    description: Collection of the updated item.
    example: articles
    oneOf:
      - type: string
      - $ref: '../openapi.yaml#/components/schemas/Collections'
  item:
    description: Primary key of updated item.
    example: '168'
    type: string
  data:
    description: Copy of item state at time of update.
    example:
      author: 1
      body: This is my first post
      featured_image: 15
      id: '168'
      title: Hello, World!
    type: object
    nullable: true
  delta:
    description: Changes between the previous and the current revision.
    example:
      title: Hello, World!
    type: object
    nullable: true
  parent:
    description: If the current item was updated relationally, this is the id of the parent revision record.
    type: integer
    nullable: true
  version:
    description: Associated version of this revision.
    oneOf:
      - type: string
        format: uuid
      - $ref: '../openapi.yaml#/components/schemas/Versions'
    nullable: true
