type: object
# Runtime: Relation type
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/relations.ts
# Response shape is the outer Relation envelope; meta is the inner RelationMeta row
# stored on directus_relations. schema is a ForeignKey per @directus/schema.
properties:
  collection:
    description: Collection on the _many_ side of the relationship. This is where the foreign key is stored.
    example: articles
    type: string
  field:
    description: Foreign key field on the _many_ collection.
    example: author
    type: string
  related_collection:
    description: Collection on the _one_ side of the relationship.
    example: directus_users
    type: string
    nullable: true
  schema:
    description: Foreign key constraint as reported by the database inspector.
    type: object
    nullable: true
    properties:
      table:
        description: Table the foreign key lives on.
        type: string
      column:
        description: Column the foreign key lives on.
        type: string
      foreign_key_table:
        description: Table the foreign key points to.
        type: string
      foreign_key_column:
        description: Column the foreign key points to.
        type: string
      foreign_key_schema:
        description: Schema the foreign key points to. Database-specific (e.g. Postgres).
        type: string
        nullable: true
      constraint_name:
        description: Name of the database foreign key constraint.
        type: string
        nullable: true
      on_update:
        description: Referential action on update of the referenced row.
        type: string
        enum: ['NO ACTION', 'RESTRICT', 'CASCADE', 'SET NULL', 'SET DEFAULT', null]
        nullable: true
      on_delete:
        description: Referential action on delete of the referenced row.
        type: string
        enum: ['NO ACTION', 'RESTRICT', 'CASCADE', 'SET NULL', 'SET DEFAULT', null]
        nullable: true
  meta:
    description: Directus-managed metadata for the relation.
    type: object
    nullable: true
    properties:
      id:
        description: Unique identifier for the relation metadata.
        example: 1
        type: integer
      many_collection:
        description: Collection that has the field that holds the foreign key.
        example: directus_activity
        type: string
      many_field:
        description: Foreign key. Field that holds the primary key of the related collection.
        example: user
        type: string
      one_collection:
        description: Collection on the _one_ side of the relationship.
        example: directus_users
        type: string
        nullable: true
      one_field:
        description: Alias column that serves as the _one_ side of the relationship.
        type: string
        nullable: true
      one_collection_field:
        description: Field on the related collection that points back at this relation (used for M2O aliases).
        type: string
        nullable: true
      one_allowed_collections:
        description: Restrict the _one_ side to this set of collections. Used by M2A relations.
        type: array
        items:
          type: string
        nullable: true
      one_deselect_action:
        description: What happens to the foreign key when the related row is deselected.
        type: string
        enum: [delete, nullify, null]
        nullable: true
      junction_field:
        description: Field on the junction table that holds the many field of the related relation.
        type: string
        nullable: true
      sort_field:
        description: Field on the junction table used to sort related items.
        type: string
        nullable: true
      system:
        description: True if this is a Directus-managed system relation.
        type: boolean
        nullable: true
