type: object
# Runtime: createOne only requires `collection` (line 70). `fields` is only
# required when `schema` is supplied (line 110-112). Everything else is meta
# or optional overrides.
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/services/collections.ts#L70
# Type: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/collection.ts
# Table shape: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/schema/src/types/table.ts
required: [collection]
properties:
  collection:
    description: The collection key.
    example: customers
    type: string
  meta:
    description: Metadata of the collection.
    type: object
    nullable: true
    properties:
      collection:
        description: The collection key.
        example: customers
        type: string
      icon:
        description: Name of a Google Material Design Icon that's assigned to this collection.
        type: string
        example: people
        nullable: true
      color:
        description: Choose an accent color for this collection.
        type: string
        example: '#6644ff'
        nullable: true
      note:
        description: A note describing the collection.
        type: string
        nullable: true
      display_template:
        description: Text representation of how items from this collection are shown across the system.
        type: string
        example: '{{ field_name }}'
        nullable: true
      hidden:
        description: Whether or not the collection is hidden from the navigation in the Data Studio.
        type: boolean
        example: false
      singleton:
        description: Whether or not the collection is treated as a single object.
        type: boolean
        example: false
      translations:
        description: Key value pairs of how to show this collection's name in different languages in the Data Studio.
        type: array
        nullable: true
        items:
          type: object
          properties:
            language:
              type: string
            translation:
              type: string
            singular:
              type: string
            plural:
              type: string
        example:
          - language: es-ES
            translation: Propiedades
            singular: Propiedad
            plural: Propiedades
      preview_url:
        description: URL pattern for live previewing an item in the Data Studio.
        type: string
        nullable: true
      versioning:
        description: Whether or not Content Versioning is enabled for this collection.
        type: boolean
        example: false
      autosave_revision_interval:
        description: Interval in milliseconds at which edits are auto-saved as revisions. Null disables auto-save.
        type: integer
        nullable: true
      archive_field:
        description: What field holds the archive value.
        type: string
        nullable: true
      archive_app_filter:
        description: Whether to show the "archived" filter toggle in the Data Studio.
        type: boolean
        example: true
      archive_value:
        description: What value to use to "archive" an item.
        type: string
        nullable: true
      unarchive_value:
        description: What value to use to "unarchive" an item.
        type: string
        nullable: true
      sort_field:
        description:
          Field on this collection that holds the manual sort order for items. Used as the default sort field when no
          `?sort=` parameter is supplied.
        type: string
        nullable: true
      item_duplication_fields:
        description: Fields to copy when duplicating an item. Null duplicates all fields.
        type: array
        nullable: true
        items:
          type: string
      accountability:
        description: What level of accountability is enforced.
        type: string
        enum: [all, activity, null]
        nullable: true
      system:
        description: Whether the collection is a system collection (managed by Directus and not user-editable).
        type: boolean
        nullable: true
      sort:
        description: Manual sort order for the collection in the Data Studio. Overrides alphabetical ordering.
        type: integer
        nullable: true
      group:
        description: Collection key of the group this collection belongs to, or null if ungrouped.
        type: string
        nullable: true
      collapse:
        description: Default expanded state of this collection group in the Data Studio navigation.
        type: string
        enum: [open, closed, locked]
      status:
        description: Whether the collection is active. Inactive collections are hidden from the Data Studio.
        type: string
        enum: [active, inactive]
  schema:
    description:
      Database representation of the underlying table, or null when the collection has no backing table (alias
      collections).
    type: object
    nullable: true
    properties:
      name:
        description: Name of the database table.
        example: customers
        type: string
      comment:
        description: Comment as saved in the database.
        type: string
        nullable: true
      schema:
        description: Database schema (pg only).
        example: public
        type: string
        nullable: true
      collation:
        description: Database collation (MySQL only).
        type: string
        nullable: true
      engine:
        description: Database engine (MySQL only).
        type: string
        nullable: true
      owner:
        description: Table owner (Postgres only).
        type: string
        nullable: true
      sql:
        description: Table definition SQL (SQLite only).
        type: string
        nullable: true
      catalog:
        description: Database catalog (MSSQL only).
        type: string
        nullable: true
