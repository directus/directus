type: object
# Runtime: FieldRaw/Field/FieldMeta types
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/fields.ts
# Column shape: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/schema/src/types/column.ts
# TYPES enum: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/constants/src/fields.ts#L18-L57
# RawField requires field + type (and collection for the create endpoint):
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/fields.ts#L74
required: [collection, field, type]
properties:
  collection:
    description: Unique name of the collection this field is in.
    example: about_us
    type: string
  field:
    description: Unique name of the field. Field name is unique within the collection.
    example: id
    type: string
  type:
    description: Directus specific data type. Used to cast values in the API.
    example: integer
    type: string
    enum:
      - alias
      - bigInteger
      - binary
      - boolean
      - csv
      - date
      - dateTime
      - decimal
      - float
      - geometry
      - geometry.Point
      - geometry.LineString
      - geometry.Polygon
      - geometry.MultiPoint
      - geometry.MultiLineString
      - geometry.MultiPolygon
      - hash
      - integer
      - json
      - string
      - text
      - time
      - timestamp
      - unknown
      - uuid
  schema:
    description: The schema info.
    type: object
    nullable: true
    properties:
      name:
        description: The name of the field.
        example: title
        type: string
      table:
        description: The collection of the field.
        example: posts
        type: string
      data_type:
        description: The database data type of the field.
        example: varchar
        type: string
      default_value:
        description: The default value of the field.
        type: string
        nullable: true
      max_length:
        description: The max length of the field.
        type: integer
        nullable: true
      numeric_precision:
        description: Numeric precision of the field.
        type: integer
        nullable: true
      numeric_scale:
        description: Numeric scale of the field.
        type: integer
        nullable: true
      is_nullable:
        description: If the field is nullable.
        example: false
        type: boolean
      is_unique:
        description: If the field has a unique constraint.
        type: boolean
      is_indexed:
        description: If the field has a database index.
        type: boolean
      is_primary_key:
        description: If the field is primary key.
        example: false
        type: boolean
      is_generated:
        description: If the field value is generated by the database.
        type: boolean
      generation_expression:
        description: Expression used to generate the column value.
        type: string
        nullable: true
      has_auto_increment:
        description: If the field has auto increment.
        example: false
        type: boolean
      foreign_key_column:
        description: Related column from the foreign key constraint.
        type: string
        nullable: true
      foreign_key_table:
        description: Related table from the foreign key constraint.
        type: string
        nullable: true
      comment:
        description: Comment as saved in the database.
        type: string
        nullable: true
      schema:
        description: Database schema (pg only).
        example: public
        type: string
        nullable: true
      foreign_key_schema:
        description: Related schema from the foreign key constraint (pg only).
        type: string
        nullable: true
  meta:
    description: The meta info.
    type: object
    nullable: true
    required: [id, collection, field, hidden, readonly, required, special, searchable]
    properties:
      id:
        description: Unique identifier for the field in the `directus_fields` collection.
        example: 3
        type: integer
      collection:
        description: Unique name of the collection this field is in.
        example: posts
        type: string
      field:
        description: Unique name of the field. Field name is unique within the collection.
        example: title
        type: string
      special:
        description: Transformation flags for field.
        type: array
        items:
          type: string
        nullable: true
      interface:
        # TODO: https://github.com/directus/directus/issues/27700#issuecomment-4996660653
        description: What interface is used in the admin app to edit the value for this field.
        example: primary-key
        type: string
        nullable: true
      options:
        description: Options for the interface that's used. This format is based on the individual interface.
        type: object
        nullable: true
      display:
        description: What display is used in the admin app to display the value for this field.
        type: string
        nullable: true
      display_options:
        description: Options for the display that's used. This format is based on the individual display.
        type: object
        nullable: true
      readonly:
        description: Prevents the user from editing the value in the field.
        example: false
        type: boolean
      hidden:
        description: If this field should be hidden in the admin app.
        example: true
        type: boolean
      sort:
        description: Sort order of this field on the edit page of the admin app.
        example: 1
        type: integer
        nullable: true
      width:
        description: Width of the field on the edit form.
        example: half
        type: string
        enum: [half, half-left, half-right, full, fill, null]
        nullable: true
      group:
        description: Field name of the parent group, or null if the field is ungrouped.
        type: string
        nullable: true
      translations:
        description: Translated field labels per language for the admin app.
        type: array
        nullable: true
        items:
          type: object
          properties:
            language:
              type: string
            translation:
              type: string
      note:
        description: A user provided note for the field. Will be rendered alongside the interface on the edit page.
        type: string
        nullable: true
      required:
        description: If the field value is required to be set on create/update.
        type: boolean
      conditions:
        description: Visibility/required/readonly/clear-hidden conditions that re-evaluate the field at runtime.
        type: array
        nullable: true
        items:
          type: object
          properties:
            name:
              type: string
            rule:
              type: object
            readonly:
              type: boolean
            hidden:
              type: boolean
            options:
              type: object
            required:
              type: boolean
            clear_hidden_value_on_save:
              type: boolean
      validation:
        description: Validation filter applied on field value. The field is invalid if any rule does not match.
        type: object
        nullable: true
      validation_message:
        description: Custom validation error message shown when `validation` fails.
        type: string
        nullable: true
      searchable:
        description: Whether this field is included in admin app full-text search.
        type: boolean
      system:
        description: True if this is a Directus-managed system field.
        type: boolean
      clear_hidden_value_on_save:
        description: If true, the field value is cleared when the field is hidden by a condition.
        type: boolean
