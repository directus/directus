type: object
# Runtime: ContentVersion type
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/versions.ts
# DB schema: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/database/migrations/20230823A-add-content-versioning.ts
properties:
  id:
    description: Primary key of the Content Version.
    example: 63716273-0f29-4648-8a2a-2af2948f6f78
    type: string
    format: uuid
  key:
    description: Key of the Content Version, used as the value for the `version` query parameter.
    example: draft
    type: string
  name:
    description: Descriptive name of the Content Version.
    example: My Draft
    type: string
    nullable: true
  collection:
    description: Name of the collection the Content Version is created on.
    example: articles
    oneOf:
      - type: string
      - $ref: '../openapi.yaml#/components/schemas/Collections'
  item:
    description: The item the Content Version is created on.
    example: '168'
    type: string
    nullable: true
  hash:
    description: Hash of the Content Version state, used to detect drift before save/promote.
    type: string
  date_created:
    description: When the Content Version was created.
    type: string
    example: '2022-05-11T13:14:52Z'
    format: date-time
  date_updated:
    description: When the Content Version was last updated.
    type: string
    example: '2022-05-11T13:14:53Z'
    format: date-time
    nullable: true
  user_created:
    description: User that created the Content Version.
    example: 63716273-0f29-4648-8a2a-2af2948f6f78
    oneOf:
      - type: string
        format: uuid
        nullable: true
      - $ref: '../openapi.yaml#/components/schemas/Users'
  user_updated:
    description: User that last updated the Content Version.
    example: 63716273-0f29-4648-8a2a-2af2948f6f78
    oneOf:
      - type: string
        format: uuid
        nullable: true
      - $ref: '../openapi.yaml#/components/schemas/Users'
  delta:
    description: The current changes compared to the main version of the item.
    example:
      my_field: Updated Value
    type: object
    nullable: true
