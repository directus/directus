type: object
# Runtime: Preset type
# https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/presets.ts
properties:
  id:
    description: Unique identifier for this single collection preset.
    example: 155
    type: integer
  bookmark:
    description: Name for the bookmark. If this is set, the preset will be considered a bookmark.
    nullable: true
    type: string
  icon:
    # icon is NOT NULL with default 'bookmark_outline':
    # https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/database/migrations/20220308A-add-bookmark-icon-and-color.ts
    description: Icon displayed in the Data Studio for the bookmark.
    example: bookmark_outline
    type: string
  color:
    description: Color of the icon displayed in the Data Studio for the bookmark.
    example: '#6644ff'
    type: string
    nullable: true
  user:
    description: The unique identifier of the user to whom this collection preset applies.
    example: 63716273-0f29-4648-8a2a-2af2948f6f78
    oneOf:
      - type: string
        format: uuid
        nullable: true
      - $ref: '../openapi.yaml#/components/schemas/Users'
  role:
    description:
      The unique identifier of a role in the platform. If `user` is null, this will be used to apply the collection
      preset or bookmark for all users in the role.
    example: 50419801-0f30-8644-2b3c-9bc2d980d0a0
    oneOf:
      - type: string
        format: uuid
        nullable: true
      - $ref: '../openapi.yaml#/components/schemas/Roles'
  collection:
    description: What collection this collection preset is used for.
    example: articles
    oneOf:
      - type: string
      - $ref: '../openapi.yaml#/components/schemas/Collections'
  search:
    description: Search query.
    type: string
    nullable: true
  filter:
    description: Filters the user applied.
    type: object
    example: { <field>: { <operator>: <value> } }
    nullable: true
  layout:
    description: Key of the layout that is used.
    type: string
    example: cards
    nullable: true
  layout_query:
    description:
      Layout query that's saved per layout type. Controls what data is fetched on load. These follow the same format as
      the JS SDK parameters.
    example:
      cards:
        sort: -published_on
    nullable: true
  layout_options:
    description: Options of the views. The properties in here are controlled by the layout.
    example:
      cards:
        icon: account_circle
        title: '{{ first_name }} {{ last_name }}'
        subtitle: '{{ title }}'
        size: 3
    nullable: true
  refresh_interval:
    description: Interval in milliseconds at which the preset refreshes its data.
    type: integer
    nullable: true
