type: object
# Runtime shape: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/types/src/extensions/app-extension-config.ts#L74-L79
# Service populates from ExtensionsManager: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/services/extensions.ts#L145-L199
# Required-field check: https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/api/src/services/extensions.ts#L201-L205
required: [id]
properties:
  id:
    description: Unique identifier for the extension in the database (UUID).
    example: 0cf0e03d-4364-45df-b77b-ca61f61869d2
    type: string
    format: uuid
  bundle:
    description: Name of the parent bundle, or null if the extension is not part of a bundle.
    example: null
    type: string
    nullable: true
  meta:
    description: Persisted project-level configuration for the extension.
    type: object
    required: [id, source, enabled, bundle, folder]
    properties:
      id:
        description: Unique identifier for the extension row in `directus_extensions`.
        type: string
        format: uuid
      source:
        description: Where the extension is installed from.
        type: string
        enum: [module, registry, local]
      enabled:
        description: Whether the extension is enabled in the current project.
        type: boolean
      bundle:
        description: Name of the parent bundle, or null if the extension is not bundled.
        type: string
        nullable: true
      folder:
        description: Extension folder name on disk. Used by the extension manager to look up the installed extension.
        type: string
  schema:
    description: Read-only metadata about the installed extension. Null when the extension is missing on disk.
    type: object
    nullable: true
    properties:
      name:
        description: Name of the extension.
        type: string
      type:
        # EXTENSION_TYPES from https://github.com/directus/directus/blob/240b801568b4cd99676dc69adc22682800215654/packages/constants/src/extensions.ts#L9-L20
        description: Type of the extension.
        type: string
        enum:
          - interface
          - display
          - layout
          - module
          - panel
          - theme
          - hook
          - endpoint
          - operation
          - bundle
      local:
        description: Whether the extension is loaded from the local `extensions/` folder.
        type: boolean
      version:
        description: Version of the installed extension, if available.
        example: 1.0.0
        type: string
        nullable: true
      host:
        description: Host package or publisher, if available.
        type: string
        nullable: true
      path:
        description: On-disk path or module path to the extension entrypoint.
        type: string
      entrypoint:
        description: Entrypoint file. Object form (`{app, api}`) for hybrid extensions, string for app/api-only.
        oneOf:
          - type: string
          - type: object
            properties:
              app:
                type: string
              api:
                type: string
      sandbox:
        description: Sandbox configuration for API extensions. Absent if the extension is not sandboxed.
        type: object
        nullable: true
        properties:
          enabled:
            type: boolean
          requestedScopes:
            type: object
            properties:
              request:
                type: object
                properties:
                  urls:
                    type: array
                    items:
                      type: string
                  methods:
                    type: array
                    items:
                      type: string
                      enum: [GET, POST, PATCH, PUT, DELETE]
              log:
                type: object
              sleep:
                type: object
      entries:
        description: Sub-extensions exposed by a bundle. Present only for bundle-type extensions.
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            type:
              type: string
      partial:
        description:
          True if the bundle is partial (some entries missing on disk). Present only for bundle-type extensions.
        type: boolean
