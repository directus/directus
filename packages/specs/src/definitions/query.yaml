type: object
properties:
  fields:
    type: array
    items:
      type: string
    description: Control what fields are being returned in the object.
    example: ['*', '*.*']
  filter:
    type: object
    example: { <field>: { <operator>: <value> } }
  search:
    description: Filter by items that contain the given search query in one of their fields.
    type: string
  sort:
    type: array
    items:
      type: string
    description: How to sort the returned items.
    example: ['-date_created']
  limit:
    type: number
    description: Set the maximum number of items that will be returned
  offset:
    type: number
    description: How many items to skip when fetching data.
  page:
    type: number
    description: Cursor for use in pagination. Often used in combination with limit.
  deep:
    type: object
    description: Deep allows you to set any of the other query parameters on a nested relational dataset.
    example: { 'related_articles': { '_limit': 3 } }
  version:
    type: string
    description: Retrieve an item's state from a specific Content Version.
  versionRaw:
    type: boolean
    description: Retrieve the raw revision data instead of the merged item data.
  aggregate:
    type: object
    description: Aggregate functions allow you to perform calculations on a set of values.
    example: { count: '*' }
  groupBy:
    type: array
    items:
      type: string
    description: Grouping allows for running aggregate functions grouped by a given field.
  alias:
    type: object
    description:
      Alias allows you to rename fields on the fly and request the same field multiple times with different
      filters/relations.
  backlink:
    type: boolean
    description: Toggle whether reverse-relational fields should be included when expanding a `*.*` wildcard.
    default: true
