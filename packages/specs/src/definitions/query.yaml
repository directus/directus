type: object
properties:
  fields:
    type: array
    items:
      type: string
    description: Control what fields are being returned in the object.
    example: ['*', '*.*']
  filter:
    type: object
    example: { <field>: { <operator>: <value> } }
  search:
    description: Filter by items that contain the given search query in one of their fields.
    type: string
  sort:
    type: array
    items:
      type: string
    description: How to sort the returned items.
    example: ['-date_created']
  limit:
    type: number
    description: Set the maximum number of items that will be returned
  offset:
    type: number
    description: How many items to skip when fetching data.
  page:
    type: number
    description: Cursor for use in pagination. Often used in combination with limit.
  deep:
    type: object
    description: Deep allows you to set any of the other query parameters on a nested relational dataset.
    example: { 'related_articles': { '_limit': 3 } }

  aggregate:
    type: object
    description: Object of aggregation functions mapped to one or more fields.
    example:
      count: "*"

  groupBy:
    type: array
    items:
      type: string
    description: Group the returned items by one or more fields.
    example: ["status"]

  alias:
    type: object
    description: Rename fields on the fly.
    example:
    author_name: author.name

  version:
    type: string
    description: Retrieve an item's state from a specific Content Version.

  versionRaw:
    type: boolean
    description: Return raw revision data instead of merged item data.

  backlink:
    type: boolean
    description: Include reverse relational fields when expanding wildcards.