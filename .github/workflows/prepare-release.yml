name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (eg: 11.12.0 or 12.0.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_OPTIONS: --max_old_space_size=6144

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate version format and existence
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          VERSION="$VERSION_INPUT"
          TAG="v$VERSION"
          REPO="${{ github.repository }}"

          # Check for stable or RC semver format
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.(0|[1-9][0-9]*))?$ ]]; then
            echo "❌ Invalid version format for '$VERSION'. Expected: x.y.z or x.y.z-rc.N"
            exit 1
          fi

          # Check for tag existence
          if gh api repos/$REPO/git/ref/tags/$TAG \
               --silent >/dev/null 2>&1; then
            echo "❌ Tag '$TAG' already exists"
            exit 1
          fi

          echo "✅ Version '$VERSION' is valid and available"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Crowdin PRs
        id: crowdin-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch open Crowdin PR
          OPEN=$(gh pr list --state open --search "New Crowdin updates" --json url --limit 10)
          # Fetch merged Crowdin PR in Next Release milestone
          MERGED=$(gh pr list --state merged --search "New Crowdin updates milestone:\"Next Release\"" --json url --limit 10)

          # Build URL lists
          OPEN_LIST=$(echo "$OPEN" | jq -r '.[] .url' | paste -sd ", " -)
          MERGED_LIST=$(echo "$MERGED" | jq -r '.[] .url' | paste -sd ", " -)

          # Determine checkbox: checked if no open PR
          if [ -z "$OPEN_LIST" ]; then
            CHECKBOX="[x]"
          else
            CHECKBOX="[ ]"
          fi

          # Combine lists
          if [ -n "$OPEN_LIST" ] && [ -n "$MERGED_LIST" ]; then
            PRS="$OPEN_LIST, $MERGED_LIST"
          else
            PRS="${OPEN_LIST}${MERGED_LIST}"
          fi

          # If list is empty
          if [ -z "$PRS" ]; then
            PRS="No Crowdin PR found"
            CHECKBOX="[x]"
          fi

          echo "crowdin_task=- $CHECKBOX Merge Crowdin PR: $PRS" >> $GITHUB_OUTPUT

          echo "✅ Crowdin PR check completed"

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Generate release notes and update versions
        id: changeset-version
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DIRECTUS_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="$DIRECTUS_VERSION"

          echo "🔄 Running changeset version..."

          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRERELEASE=true

            if [ -f .changeset/pre.json ]; then
              PRE_MODE=$(node -p "require('./.changeset/pre.json').mode")
              PRE_TAG=$(node -p "require('./.changeset/pre.json').tag")

              if [ "$PRE_MODE" != "pre" ] || [ "$PRE_TAG" != "rc" ]; then
                echo "❌ Expected existing prerelease mode for rc, found mode '$PRE_MODE' and tag '$PRE_TAG'"
                exit 1
              fi

              echo "➡️ Continuing existing rc prerelease mode..."
            else
              echo "➡️ Entering rc prerelease mode..."
              pnpm changeset pre enter rc
            fi
          else
            IS_PRERELEASE=false

            if [ -f .changeset/pre.json ]; then
              PRE_MODE=$(node -p "require('./.changeset/pre.json').mode")

              if [ "$PRE_MODE" = "pre" ]; then
                echo "➡️ Exiting prerelease mode..."
                pnpm changeset pre exit
              elif [ "$PRE_MODE" = "exit" ]; then
                echo "➡️ Prerelease mode already marked for exit..."
              else
                echo "❌ Unexpected changeset prerelease mode '$PRE_MODE'"
                exit 1
              fi
            fi
          fi

          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          # Capture the changeset version output without letting `set -e`
          # abort before we've printed it (default shell runs with -eo pipefail)
          set +e
          OUTPUT=$(pnpm changeset version 2>&1)
          STATUS=$?
          set -e

          # Always surface the output so failures are visible in the logs
          echo "$OUTPUT"

          if [ "$STATUS" -ne 0 ]; then
            echo "❌ 'pnpm changeset version' failed with exit code $STATUS"
            exit 1
          fi

          # Extract release notes from the output
          # The release notes generator outputs between the divider lines
          RELEASE_NOTES=$(echo "$OUTPUT" | awk -v RS="==============================================================" 'NR==3 {print}' | sed '1{/^$/d}')

          # Output release notes
          {
            echo "release_notes<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Verify version was updated in main package
          PACKAGE_VERSION=$(node -p "require('./directus/package.json').version")
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch: package.json shows $PACKAGE_VERSION, expected $VERSION"
            exit 1
          fi

          echo "✅ Version updated successfully to $VERSION"

      - name: Verify changeset cleanup
        if: steps.changeset-version.outputs.is_prerelease != 'true'
        run: |
          # Count remaining changeset files (excluding config)
          CHANGESET_COUNT=$(find .changeset -name "*.md" -not -name "config.json" | wc -l)
          if [ $CHANGESET_COUNT -ne 0 ]; then
            echo "❌ Changesets not properly cleared. Found $CHANGESET_COUNT remaining files:"
            find .changeset -name "*.md" -not -name "config.json"
            exit 1
          fi

          if [ -f .changeset/pre.json ]; then
            echo "❌ Prerelease state was not cleared"
            exit 1
          fi

          echo "✅ Changesets cleared successfully"

      - name: Create release PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          VERSION="$VERSION_INPUT"
          TAG="v$VERSION"
          BRANCH_NAME="release-$VERSION"
          PR_TITLE="Release $VERSION"

          # Build the PR body content
          PR_BODY=$(cat <<'EOF'
          ### ✅ Release Checklist
          - [x] Changesets processed
          - [x] Package versions updated
          - [x] Release notes generated
          ${{ steps.crowdin-check.outputs.crowdin_task }}
          - [ ] PR reviewed and approved
          - [ ] Blackbox tests passed
          - [ ] E2E tests passed

          ### 🚀 Release Notes
          ```md
          ${{ steps.changeset-version.outputs.release_notes }}
          ```
          EOF
          )

          # Configure git and commit changes
          git checkout -b "$BRANCH_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release $VERSION"
          git push origin "$BRANCH_NAME" --force

          # Look for existing open PR with this branch
          EXISTING_PR=$(gh pr list \
            --state open \
            --head "$BRANCH_NAME" \
            --json number \
            --jq '.[0].number' || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "🔄 Updating existing PR #$EXISTING_PR"
            gh pr edit $EXISTING_PR \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
            echo "new_pr=false" >> $GITHUB_OUTPUT
          else
            echo "✨ Creating new PR"
            NEW_PR=$(gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --label "Release" \
              --label "Run Blackbox" \
              --label "Run E2E" \
              --label "No Changeset" \
              --head "$BRANCH_NAME" \
              --base "main" \
              --draft=false \
              | grep -o '[0-9]\+$')
            echo "pr_number=$NEW_PR" >> $GITHUB_OUTPUT
            echo "new_pr=true" >> $GITHUB_OUTPUT
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: steps.create-pr.outputs.new_pr == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CMS_FREEZE }}
        run: |
          PAYLOAD=$(jq -n \
            --arg tag "${{ steps.create-pr.outputs.tag }}" \
            --arg pr_number "${{ steps.create-pr.outputs.pr_number }}" \
            '{tag: $tag, pr_number: $pr_number}')
          curl -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
