name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Generate a GitHub App installation token to retrigger CI workflows on push
      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/making-authenticated-api-requests-with-a-github-app-in-a-github-actions-workflow
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: skyramp/testbot@SKYR-3625
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          auto_commit: 'true'
          skyramp_mcp_version: next
          skyramp_executor_version: v1.3.13
          target_setup_command: 'docker compose -f docker-compose.testbot.yml up -d'
          target_teardown_command: 'docker compose -f docker-compose.testbot.yml down -v'
          target_ready_check_command: 'curl -sf http://localhost:8055/server/health'
          target_ready_check_timeout: '300'
          auth_token_command: >
            curl -sf -X POST http://localhost:8055/auth/login
            -H 'Content-Type: application/json'
            -d '{"email":"admin@example.com","password":"admin"}'
            | jq -r '.data.access_token'
