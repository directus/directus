name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/${{ github.repository }}
  COSIGN_REPOSITORY: docker.io/${{ github.repository }}-signatures

jobs:
  check-npm-packages:
    name: Check NPM Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if packages exist on NPM
        uses: directus/npm-package-existence-checker@v1

  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    needs: check-npm-packages
    outputs:
      prerelease: ${{ steps.version.outputs.prerelease && true || false }}
    steps:
      - name: Check version
        uses: madhead/semver-utils@v4
        id: version
        with:
          version: ${{ github.ref_name }}
          lenient: false

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: check-version
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      deployments: write
      discussions: write
      id-token: write
      issues: write
      models: read
      packages: write
      pages: write
      pull-requests: write
      security-events: write
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          registry: https://registry.npmjs.org

      - name: Publish packages to NPM
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          pnpm --recursive publish \
            --access=public \
            --no-git-checks \
            --tag ${{ needs.check-version.outputs.prerelease == 'true' && 'canary'  || 'latest' }}

  build-images:
    name: Build Images
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: standard
            suffix: ''
            file: ./Dockerfile
          - name: dhi
            suffix: '-dhi'
            file: ./Dockerfile.dhi
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      deployments: write
      discussions: write
      id-token: write
      issues: write
      models: read
      packages: write
      pages: write
      pull-requests: write
      security-events: write
      statuses: write
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_SLUG=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ env.PLATFORM_SLUG }}-${{ matrix.variant.name }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PLATFORM_SLUG }}-${{ matrix.variant.name }}-buildx-

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            suffix=${{ matrix.variant.suffix }},onlatest=true
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.check-version.outputs.prerelease == 'false' }}
            type=raw,value=canary,enable=${{ needs.check-version.outputs.prerelease }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: env.DOCKERHUB_IMAGE != ''
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        if: env.GHCR_IMAGE != ''
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # DHI base image lives behind an entitled registry; reuse the Docker Hub
      # publishing credentials (that account must hold the DHI entitlement).
      # Gated to the dhi variant so the standard build never attempts this login.
      - name: Login to DHI registry
        uses: docker/login-action@v3
        if: matrix.variant.name == 'dhi'
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ${{ matrix.variant.file }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          # prettier-ignore
          outputs: type=image,"name=${{ env.DOCKERHUB_IMAGE }},${{ env.GHCR_IMAGE }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.variant.name }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      # Temp fix for cache growth:
      # https://github.com/docker/build-push-action/issues/252
      # https://github.com/moby/buildkit/issues/1896
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  publish-docker-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs:
      - check-version
      - build-images
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: standard
            suffix: ''
          - name: dhi
            suffix: '-dhi'
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      deployments: write
      discussions: write
      id-token: write
      issues: write
      models: read
      packages: write
      pages: write
      pull-requests: write
      security-events: write
      statuses: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.variant.name }}-*
          merge-multiple: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        if: env.DOCKERHUB_IMAGE != ''

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            suffix=${{ matrix.variant.suffix }},onlatest=true
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.check-version.outputs.prerelease == 'false' }}
            type=raw,value=canary,enable=${{ needs.check-version.outputs.prerelease }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: env.DOCKERHUB_IMAGE != ''
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        if: env.GHCR_IMAGE != ''
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push to Docker Hub
        id: push-dockerhub
        if: env.DOCKERHUB_IMAGE != ''
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("docker.io"))) | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s ' *)

      - name: Create manifest list and push to GHCR
        if: env.GHCR_IMAGE != ''
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io"))) | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.GHCR_IMAGE }}@sha256:%s ' *)

      - name: Get Docker Hub manifest digest
        id: get-digest
        if: env.DOCKERHUB_IMAGE != ''
        run: |
          set -euo pipefail
          DIGEST=$(docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }} --format '{{json .Manifest.Digest}}' | tr -d '"')
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to get manifest digest for ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}"
            exit 1
          fi
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign Docker Hub image with GitHub OIDC Token
        if: env.DOCKERHUB_IMAGE != ''
        run: |
          cosign sign --yes --recursive ${{ env.DOCKERHUB_IMAGE }}@${{ steps.get-digest.outputs.digest }}

      - name: Inspect Docker Hub image
        if: env.DOCKERHUB_IMAGE != ''
        run: |
          docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}

      - name: Inspect GHCR image
        if: env.GHCR_IMAGE != ''
        run: |
          docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    # Runs after the release exists and uploads SBOMs to it directly, so a
    # flaky SBOM step can never block or strand release creation. If this job
    # fails, the release (and the already-published npm/docker artifacts) are
    # untouched: use "Re-run failed jobs" in the Actions UI to re-drive just
    # this job. The upload is idempotent (gh release upload --clobber), so a
    # re-run cleanly (re-)attaches the SBOMs to the existing release.
    needs:
      - check-version
      - publish-docker-images
      - create-release
    permissions:
      contents: write
      packages: read
    strategy:
      fail-fast: false
      # Serialize the variants: both legs run `gh release upload` against the
      # same release, and concurrent asset uploads to one release can 422.
      max-parallel: 1
      matrix:
        variant:
          - name: standard
            suffix: ''
            file: ./Dockerfile
          - name: dhi
            suffix: '-dhi'
            file: ./Dockerfile.dhi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Reuse the amd64 build cache from the build-images job so the builder
      # stage is a cache hit rather than a full rebuild. SBOMs are generated
      # for a single platform: npm packages are arch-independent and the OS
      # package set/versions match across amd64/arm64 for these images.
      - name: Restore Docker layer cache (amd64)
        uses: actions/cache/restore@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-linux-amd64-${{ matrix.variant.name }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-linux-amd64-${{ matrix.variant.name }}-buildx-

      # Bare version only (e.g. 11.2.0). The published tag suffix (-dhi) is
      # appended explicitly from the matrix below, so this must NOT set a
      # suffix flavor.
      - name: Extract version
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Build the builder stage only (no runtime base needed, so no DHI
      # entitlement required here). This captures the full build closure:
      # the builder-stage OS toolchain plus the complete npm graph including
      # dev/transitive dependencies (the builder runs a non-prod install).
      - name: Build builder stage for build-time SBOM
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.file }}
          target: builder
          platforms: linux/amd64
          load: true
          tags: directus-builder-sbom:${{ matrix.variant.name }}
          cache-from: type=local,src=/tmp/.buildx-cache

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      # Build-time SBOM: everything used to produce the artifact.
      - name: Generate build-time SBOM
        run: |
          syft "directus-builder-sbom:${{ matrix.variant.name }}" \
            -o "spdx-json=directus-${{ steps.meta.outputs.version }}${{ matrix.variant.suffix }}.buildtime.spdx.json" \
            -o "cyclonedx-json=directus-${{ steps.meta.outputs.version }}${{ matrix.variant.suffix }}.buildtime.cdx.json"

      # Run-time SBOM: what is actually shipped in the published image
      # (OS packages plus the production node_modules bundled into dist).
      - name: Generate run-time SBOM
        run: |
          syft "${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}${{ matrix.variant.suffix }}" \
            --platform linux/amd64 \
            -o "spdx-json=directus-${{ steps.meta.outputs.version }}${{ matrix.variant.suffix }}.runtime.spdx.json" \
            -o "cyclonedx-json=directus-${{ steps.meta.outputs.version }}${{ matrix.variant.suffix }}.runtime.cdx.json"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sbom-${{ matrix.variant.name }}
          path: directus-*.json
          if-no-files-found: error
          retention-days: 1

      # Attach the SBOMs to the release that create-release already published.
      # --clobber makes this idempotent so a re-run replaces any partial set.
      - name: Attach SBOMs to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" directus-*.json --clobber

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - check-version
      - publish-npm
      - publish-docker-images
    steps:
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create \
            "$GITHUB_REF_NAME" \
            ${{ needs.check-version.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            --notes "Directus $GITHUB_REF_NAME"
