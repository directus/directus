name: e2e Tests

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - tests/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/blackbox.yml
  workflow_call:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db:
    name: ${{ matrix.vendor }} ${{ matrix.sandbox && 'sandbox' || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        vendor:
          - sqlite
          - postgres
          - mysql
          - maria
          - mssql
          - oracle
          - cockroachdb
        sandbox:
          - true
          - false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Run tests
        run: |
          cd tests/e2e/
          LOG_LEVEL=debug pnpm vitest --project ${{ matrix.vendor }}${{ matrix.sandbox && '-sb' || '' }} --no-file-parallelism
